version: "3.9"

services:
  # Django backend
  backend:
    build: ./backend
    image: myapp:django
    container_name: django_backend_container
    # ports:
    #   - 8000:8000
    command: >
      sh -c "sleep 10 &&
             python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn backend_rnd.wsgi:application --bind 0.0.0.0:8000 --timeout 5 --threads 10"
    # environment:
      # - DB_HOST=db
      # - DB_NAME=${DB_NAME}
      # - DB_USER=${DB_USER}
      # - DB_PASS=${DB_PASS}
      # - DB_PORT=5432
      # - SECRET_KEY=${SECRET_KEY}
    # depends_on:
    #   - db



  # PostgreSQL database
  # db:
  #   image: postgres:14-alpine
  #   container_name: postgres_container
  #   environment:
  #     POSTGRES_USER: ${DB_USER}
  #     POSTGRES_PASSWORD: ${DB_PASS}
  #     POSTGRES_DB: ${DB_NAME}
  #   volumes:
  #     - dev-db-data:/var/lib/postgresql/data
  #   ports:
  #     - 5432:5432



  # React frontend
  frontend:
    build:
      context: ./frontend
      args:
        VITE_SERVER_BASE_URL: "/api/v1"
    image: react-frontend
    container_name: react_frontend_container
    # ports:
    #   - 5173:80
    depends_on:
      - backend
    command: >
      sh -c "sleep 15 && nginx -g 'daemon off;'"



  nginx:
    image: nginx:alpine
    container_name: nginx_container
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # - ./certbot/www:/var/www/certbot
      # - /etc/letsencrypt/:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    command: >
      sh -c "sleep 20 && nginx -g 'daemon off;'"



