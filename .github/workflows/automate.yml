name: Build / Deploy / Rollback

on:
  push:
    branches:
      - main

jobs:

  deploy:
    if: "!contains(github.event.head_commit.message, 'rollback')"
    runs-on: ubuntu-latest

    env:
      GCP_REGION: ${{ secrets.GCP_REGION }}               
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}       
      BACKEND_REPO: ${{ secrets.GAR_BACKEND_REPO }}      
      FRONTEND_REPO: ${{ secrets.GAR_FRONTEND_REPO }}    
      IMAGE_TAG: ${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GAR
        run: |
          gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev

      - name: Build & Push Backend Image to GAR
        run: |
          docker build -t ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${BACKEND_REPO}/backend:${IMAGE_TAG} ./backend
          docker push ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${BACKEND_REPO}/backend:${IMAGE_TAG}

      - name: Build & Push Frontend Image to GAR
        run: |
          docker build -t ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${FRONTEND_REPO}/frontend:${IMAGE_TAG} ./frontend
          docker push ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${FRONTEND_REPO}/frontend:${IMAGE_TAG}

      - name: Deploy to Linode via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /opt/clickmart
            git pull origin main

  rollback:
    if: "contains(github.event.head_commit.message, 'rollback')"
    runs-on: ubuntu-latest

    steps:
      - name: Rollback on Linode
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /opt/clickmart
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d