name: Deploy and Rollback

on:
  push:
    branches:
      - main

env:
  # Default rollback tag (can change if needed)
  ROLLBACK_TAG: '7'

jobs:

  build-and-deploy:
    if: "!contains(github.event.head_commit.message, 'rollback')"
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      BACKEND_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/clickmart-backend
      FRONTEND_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/clickmart-frontend
      TAG: ${{ github.run_number }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t $BACKEND_REPO:$TAG ./backend
          docker push $BACKEND_REPO:$TAG

      - name: Build and push frontend image
        run: |
          docker build --build-arg VITE_SERVER_BASE_URL=/api/v1 \
            -t $FRONTEND_REPO:$TAG ./frontend
          docker push $FRONTEND_REPO:$TAG

      - name: Deploy to Linode via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /opt/clickmart
            git pull origin main
            docker compose up --build -d


  rollback:
    if: "contains(github.event.head_commit.message, 'rollback')"
    runs-on: ubuntu-latest

    steps:
      - name: Rollback Deployment to Linode
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /opt/clickmart

            # Stop and remove old containers
            docker compose down -v

            # Pull the rollback images
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/clickmart-backend:${{ env.ROLLBACK_TAG }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/clickmart-frontend:${{ env.ROLLBACK_TAG }}

            # Override images temporarily using environment variable for Compose
            export COMPOSE_DOCKER_CLI_BUILD=0
            export DOCKER_BUILDKIT=0

            # Run containers using pulled images (ignore local build)
            docker compose up -d --force-recreate --no-build