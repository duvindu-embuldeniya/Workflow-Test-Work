name: Deploy and Rollback

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:
    if: "!contains(github.event.head_commit.message, 'rollback')"
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      BACKEND_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/clickmart-backend
      FRONTEND_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/clickmart-frontend
      TAG: ${{ github.run_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t $BACKEND_REPO:$TAG ./backend
          docker push $BACKEND_REPO:$TAG

      - name: Build and push frontend image
        run: |
          docker build --build-arg VITE_SERVER_BASE_URL=/api/v1 \
            -t $FRONTEND_REPO:$TAG ./frontend
          docker push $FRONTEND_REPO:$TAG

      - name: Deploy to Linode via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /opt/clickmart
            # Define images dynamically for this session
            export BACKEND_IMAGE=${BACKEND_REPO}:${TAG}
            export FRONTEND_IMAGE=${FRONTEND_REPO}:${TAG}

            # Login to Docker Hub
            echo $DOCKERHUB_PASSWORD | docker login --username $DOCKERHUB_USERNAME --password-stdin

            # Start containers using docker-compose
            docker compose up -d --build --force-recreate

  rollback:
    if: "contains(github.event.head_commit.message, 'rollback')"
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      ROLLBACK_TAG: '14'  # change to the tag you want to rollback to
      BACKEND_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/clickmart-backend
      FRONTEND_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/clickmart-frontend
    steps:
      - name: Rollback Deployment to Linode
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /opt/clickmart

            # Define rollback images dynamically
            export BACKEND_IMAGE=${BACKEND_REPO}:${ROLLBACK_TAG}
            export FRONTEND_IMAGE=${FRONTEND_REPO}:${ROLLBACK_TAG}

            # Login to Docker Hub (non-interactive)
            echo $DOCKERHUB_PASSWORD | docker login --username $DOCKERHUB_USERNAME --password-stdin

            # Stop old containers
            docker compose down -v

            # Pull rollback images
            docker pull $BACKEND_IMAGE
            docker pull $FRONTEND_IMAGE

            # Start rollback containers using the same docker-compose.yml
            docker compose up -d --force-recreate --no-build