name: Build / Deploy / Rollback

on:
  push:
    branches:
      - main

jobs:

  deploy:
    if: "!contains(github.event.head_commit.message, 'rollback')"
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      IMAGE_TAG: ${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & Push Backend Image
        run: |
          docker build -t duvindune/clickmart-backend:$IMAGE_TAG ./backend
          docker push duvindune/clickmart-backend:$IMAGE_TAG

      - name: Build & Push Frontend Image
        run: |
          docker build -t duvindune/clickmart-frontend:$IMAGE_TAG ./frontend
          docker push duvindune/clickmart-frontend:$IMAGE_TAG

      - name: Deploy to Linode via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /opt/clickmart
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d


  rollback:
    if: "contains(github.event.head_commit.message, 'rollback')"
    runs-on: ubuntu-latest

    steps:
      - name: Rollback on Linode
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /opt/clickmart
            docker compose -f docker-compose.prod.yml up -d