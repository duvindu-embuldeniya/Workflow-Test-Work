name: Deploy and Rollback

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:
    if: "!contains(github.event.head_commit.message, 'rollback')"
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      BACKEND_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/clickmart-backend
      FRONTEND_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/clickmart-frontend
      TAG: ${{ github.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t $BACKEND_REPO:$TAG ./backend
          docker push $BACKEND_REPO:$TAG

      - name: Build and push frontend image
        run: |
          docker build --build-arg VITE_SERVER_BASE_URL=/api/v1 \
            -t $FRONTEND_REPO:$TAG ./frontend
          docker push $FRONTEND_REPO:$TAG

      - name: Deploy to Linode via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /opt/clickmart
            git pull origin main
            docker compose up --build -d

  rollback:
    if: "contains(github.event.head_commit.message, 'rollback')"
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      ROLLBACK_TAG: '15'  # rollback tag you want
      BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/clickmart-backend:14
      FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/clickmart-frontend:14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Docker login in the runner (like deploy job)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}

      - name: Rollback Deployment to Linode
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /opt/clickmart

            # Stop and remove old containers
            docker compose -f docker-compose.rollback.yml down -v

            # Pull rollback images (already logged in via GitHub Action)
            docker pull $BACKEND_IMAGE
            docker pull $FRONTEND_IMAGE

            # Start containers using rollback compose file
            docker compose -f docker-compose.rollback.yml up -d --force-recreate --no-build